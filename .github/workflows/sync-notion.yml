name: Sync Notion → Portfolio

on:
  schedule:
    - cron: '0 0 * * *'   # 매일 오전 9시 KST (UTC 00:00)
  workflow_dispatch:        # 수동 실행 버튼
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch Notion data
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: node scripts/fetch-notion.js

      - name: Commit if changed
        run: |
          git config user.name  "portfolio-bot"
          git config user.email "iqup12@gmail.com"
          git add data/projects.json
          git diff --staged --quiet || \
            git commit -m "chore: sync Notion data $(date +%Y-%m-%d)"
          git push
